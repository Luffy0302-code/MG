    <style>

  .dropdown-menu li {
    padding: 8px;
}

.dropdown-menu a {
    font-family: sans-serif;
    text-decoration: none;
    color: black;
    font-weight: bold;
}

.menu-wrapper {
    position: relative;      /* anchor for dropdown */
    margin: 20px;
    z-index: 10000;          /* whole block above rectangles */
}

.menu-container {
    position: absolute;
    top: 100%;                 /* align with wrapper margin */
    left: 70%;                /* align with wrapper margin */

    width: 40px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 10px;
    border-radius: 8px;
    transition: background 0.2s, border 0.2s;
}

.menu-container:hover {
    background: #e0e0e0;
}

.menu-container.active {
    background: #d0d0d0;
}

.dropdown-menu {
    position: absolute;
    top: 60px;               /* ⭐ directly under the button */
    left: 70%;                /* ⭐ right-aligned with the button */

    display: none;
    list-style: none;
    padding: 10px;
    background-color: white;
    border: 2px solid black;
    border-radius: 8px;
    width: 150px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

        #searchBar {
            display: block;
            margin-top: 20px;
            width: 300px;
            height: 40px;
            font-size: 25px;
            padding: 5px;
            border: 2px solid black;
    border-radius: 8px;
        }

 
 
   

    #result.correct {
        color: green;
    }

    #result.wrong {
        color: red;
    }

    #gameContainer {
    text-align: center;      /* centers text + inline elements */
    width: 100%;             /* full width */
}

body {
    margin: 0;
    padding: 0;
}

.menu-container {
    margin-left: auto;
    margin-right: auto;
}

.dropdown-menu {
    left: 50%;
    transform: translateX(-50%);
}

        .light-box {
    width: 100%;
    height: 25px;              /* adjust height */
    background: #acacac;       /* light grey */
               /* spacing */
         /* optional */
}

.dark-box {
    width: 100%;
    height: 25px;              /* adjust height */
    background: #242323;          /* dark grey / near black */

    </style>

    

</head>
<body>
    <div class="light-box"></div>
    <div class="dark-box"></div>
     <div class="menu-container" onclick="toggleMenu()">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
</div>

    

<ul class="dropdown-menu">
    <li><a href="Home.html">Home</a></li>

</ul>
     
   <h2>MG<h2>
    <hr>
    <div id="gameContainer">
    <h2>Multiply the Numbers:</h2>    
    <p id="num1"></p>
    <p id="num2"></p>
    <input type="number" id="searchBar" placeholder="Answer">
    
    
    
   <div id="resultBox">
    <span id="result"></span>
</div>
</div>
      
   

    
        
    <script>

        function toggleMenu() {
    let menu = document.querySelector('.dropdown-menu');
    menu.style.display = menu.style.display === 'none' || menu.style.display === '' ? 'block' : 'none';
}
        
        function generateQuestion() {
            // Generate two random numbers
            num1 = Math.floor(Math.random() * 10) + 1;
            num2 = Math.floor(Math.random() * 10) + 1;

            // Display the numbers
            document.getElementById("num1").innerText = `${num1} x  ${num2}`;            
            document.getElementById("result").innerText = "";
            document.getElementById("searchBar").value = "";
        }

        function checkAnswer() {
            let userInput = document.getElementById("searchBar").value;
            let correctAnswer = num1 * num2;

            if (parseInt(userInput) === correctAnswer) {
                document.getElementById("result").innerText = "Correct!";
            } else {
                document.getElementById("result").innerText = "Try again!";
            }

            // Wait 1 seconds before generating a new question
            setTimeout(generateQuestion, 1000);
        }

        // Generate the first question
        generateQuestion();

        // Add event listener for Enter key press
        document.getElementById("searchBar").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkAnswer();
            }
        });

   function checkAnswer() {
    let userInput = document.getElementById("searchBar").value;
    let correctAnswer = num1 * num2;

    let resultBox = document.getElementById("resultBox");
    let resultText = document.getElementById("result");

    resultBox.style.display = "block"; // show the box

    if (parseInt(userInput) === correctAnswer) {
        resultText.innerText = "Correct!";
        resultText.className = "correct";
    } else {
        resultText.innerText = "Try again!";
        resultText.className = "wrong";
    }

    setTimeout(generateQuestion, 1000);
}

    </script>

    
</body>
