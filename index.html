    <script>

        function toggleMenu() {
    let menu = document.querySelector('.dropdown-menu');
    menu.style.display = menu.style.display === 'none' || menu.style.display === '' ? 'block' : 'none';
}

function toggleMenu() {
    const tray = document.getElementById("sideTray");
    const overlay = document.getElementById("overlay");

    tray.classList.toggle("open");
    overlay.classList.toggle("show");
}

document.getElementById("overlay").addEventListener("click", function () {
    document.getElementById("sideTray").classList.remove("open");
    document.getElementById("overlay").classList.remove("show");
});

document.getElementById("signupForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let user = document.getElementById("username").value;
    let email = document.getElementById("email").value;

    document.getElementById("signupMessage").innerText =
        "Account created for " + user + "!";
});

// Get existing users from localStorage or start with empty array
function getUsers() {
    return JSON.parse(localStorage.getItem('users') || '[]');
}

function saveUsers(users) {
    localStorage.setItem('users', JSON.stringify(users));
}

// SIGN UP
document.getElementById('signupForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const username = document.getElementById('su-username').value.trim();
    const email    = document.getElementById('su-email').value.trim();
    const password = document.getElementById('su-password').value;

    let users = getUsers();

    // check if username already exists
    if (users.some(u => u.username === username)) {
        document.getElementById('signupMessage').innerText = 'Username already taken.';
        return;
    }

    users.push({ username, email, password });
    saveUsers(users);

    document.getElementById('signupMessage').innerText = 'Account created for ' + username + '!';
    document.getElementById('signupForm').reset();
});

// LOGIN
document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const username = document.getElementById('li-username').value.trim();
    const password = document.getElementById('li-password').value;

    let users = getUsers();

    const match = users.find(u => u.username === username && u.password === password);

    if (match) {
        document.getElementById('loginMessage').innerText = 'Welcome, ' + username + '!';
        // here you could set a "currentUser" in localStorage
        localStorage.setItem('currentUser', username);
    } else {
        document.getElementById('loginMessage').innerText = 'Invalid username or password.';
    }
});
