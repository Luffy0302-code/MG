.menu-wrapper {
    position: relative;      /* anchor for dropdown */

    z-index: 10000;          /* whole block above rectangles */
}

.menu-container {
    position: absolute;
    top: 100%;                 /* align with wrapper margin */
    left: 70%;                /* align with wrapper margin */

    width: 40px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 10px;
    border-radius: 8px;
    transition: background 0.2s, border 0.2s;
}

.menu-container:hover {
    background: #242323;
}

.menu-container.active {
    background: #242323;
}

.dropdown-menu {
    position: absolute;
    top: 60px;               /* ⭐ directly under the button */
    left: 70%;                /* ⭐ right-aligned with the button */

    list-style: none;
    padding: 10px;
    background-color: white;
    border: 2px solid black;
    border-radius: 8px;

    <script>

        function toggleMenu() {
    let menu = document.querySelector('.dropdown-menu');
    menu.style.display = menu.style.display === 'none' || menu.style.display === '' ? 'block' : 'none';
}

function toggleMenu() {
    let menu = document.querySelector('.dropdown-menu');
    let icon = document.querySelector('.menu-container');

    let isOpen = menu.style.display === 'block';

    menu.style.display = isOpen ? 'none' : 'block';

    // Add/remove active class
    if (isOpen) {
        icon.classList.remove('active');
    } else {
        icon.classList.add('active');
    }
}

// Close dropdown when clicking anywhere else
document.addEventListener('click', function(event) {
    const menu = document.querySelector('.dropdown-menu');
    const icon = document.querySelector('.menu-container');

    // If click is NOT inside the menu or the icon → close it
    if (!menu.contains(event.target) && !icon.contains(event.target)) {
        menu.style.display = 'none';
        icon.classList.remove('active');
    }
});

document.getElementById("signupForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let user = document.getElementById("username").value;
    let email = document.getElementById("email").value;

    document.getElementById("signupMessage").innerText =
        "Account created for " + user + "!";
});

// Get existing users from localStorage or start with empty array
function getUsers() {
    return JSON.parse(localStorage.getItem('users') || '[]');
}

function saveUsers(users) {
    localStorage.setItem('users', JSON.stringify(users));
}

// SIGN UP
document.getElementById('signupForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const username = document.getElementById('su-username').value.trim();
    const email    = document.getElementById('su-email').value.trim();
    const password = document.getElementById('su-password').value;

    let users = getUsers();

    // check if username already exists
    if (users.some(u => u.username === username)) {
        document.getElementById('signupMessage').innerText = 'Username already taken.';
        return;
    }

    users.push({ username, email, password });
    saveUsers(users);

    document.getElementById('signupMessage').innerText = 'Account created for ' + username + '!';
    document.getElementById('signupForm').reset();
});

// LOGIN
document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const username = document.getElementById('li-username').value.trim();
    const password = document.getElementById('li-password').value;

    let users = getUsers();

    const match = users.find(u => u.username === username && u.password === password);

    if (match) {
        document.getElementById('loginMessage').innerText = 'Welcome, ' + username + '!';
        // here you could set a "currentUser" in localStorage
        localStorage.setItem('currentUser', username);
    } else {
        document.getElementById('loginMessage').innerText = 'Invalid username or password.';
    }
});
